<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Admin Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="flex justify-center items-center h-screen bg-[#f7ede2]">


<div class="bg-white p-8 shadow rounded w-90">

<h1 class="text-xl font-bold mb-6 text-center">
Admin Login
</h1>

<input id="username"
placeholder="Username"
class="border w-full p-2 mb-4">

<input id="password"
type="password"
placeholder="Password"
class="border w-full p-2 mb-4">


<button onclick="login()"
class="border border-black w-full py-3 mt-6 hover:bg-[#ffa200] font-semibold">

Login

</button>

</div>


<script src="js/login.js"></script>

</body>
</html>
