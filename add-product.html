<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Add Product</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#f7ede2]">


<div class="max-w-xl mx-auto p-8 bg-white mt-20">

<h1 class="text-2xl font-bold mb-6">
Voeg product toe
</h1>


<input id="name"
placeholder="Naam"
class="border w-full p-2 mb-4">


<input id="price"
type="number"
placeholder="Prijs"
class="border w-full p-2 mb-4">


<input 
id="image-url"
type="text"
placeholder="Image URL"
class="border w-full p-2 mb-4">


<button onclick="addProduct()"
class="border border-black w-full py-3 mt-6 hover:bg-[#ffa200] font-semibold">

Voeg toe

</button>

</div>


<script src="js/add-product.js"></script>

</body>
</html>
