<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Product</title>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#f7ede2]">


<div class="max-w-xl mx-auto p-8 bg-white mt-20">

<h1 class="text-2xl font-bold mb-6">
Edit product
</h1>


<input id="name"
class="border w-full p-2 mb-4">


<input id="price"
type="number"
class="border w-full p-2 mb-4">

<input 
id="image-url"
type="text"
placeholder="Image URL"
class="border w-full p-2 mb-4">


<button id="edit-btn"
class="border border-black w-full py-3 mt-6 hover:bg-[#ffa200] font-semibold">
Edit
</button>

</div>


<script src="js/edit-product.js"></script>

</body>
</html>
